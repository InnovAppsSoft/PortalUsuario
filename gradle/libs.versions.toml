# Google/Firebase
firebase-bom = "33.1.2"
google-services = "4.4.2"
firebase-appdistribution-gradle = "5.0.0"
firebase-crashlytics-gradle = "3.0.2"
material = "1.12.0"

# Hilt/Dagger
hilt = "2.52"

# Kotlin
kotlin = "2.0.10"
kotlinx-coroutines = "1.7.3"
ksp = "2.0.10-1.0.24"

# SuiteTecsa SDK
suitetecsa-sdk-kotlin = "1.0.0-alpha04"
