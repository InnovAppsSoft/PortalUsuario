# Testing
junit = "4.13.2"
androidx-test-ext-junit = "1.2.1"
monitor = "1.7.1"

# Plugins
# AGP version is hardcoded in build.gradle.kts buildscript block
# to avoid classpath conflicts with Firebase plugins
# agp = "8.5.1"

# Tools/Utilities
accompanist-pager = "0.34.0"
neumorphism = "0.3.0"
androidsvg-aar = "1.4"
